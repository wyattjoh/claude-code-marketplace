name: "Update Marketplace"
description: "Opens a PR to update a plugin version in the marketplace registry"

inputs:
  plugin-name:
    description: "Plugin identifier matching the name field in marketplace.json"
    required: true
  version:
    description: "Bare semver version (e.g., 0.3.0)"
    required: true
  ref:
    description: "Git ref to pin in source.ref (e.g., dokploy-mcp-v0.3.0)"
    required: true
  sha:
    description: "Commit SHA to pin in source.sha (e.g., github.sha from the calling workflow)."
    required: true
  token:
    description: "Fine-grained PAT with contents:write + pull-requests:write on the marketplace repo"
    required: true

outputs:
  pr-url:
    description: "URL of the created or updated PR"
    value: ${{ steps.pr.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Checkout marketplace
      uses: actions/checkout@v6
      with:
        repository: wyattjoh/claude-code-marketplace
        token: ${{ inputs.token }}
        path: __marketplace
        fetch-depth: 0

    - name: Update marketplace.json
      id: update
      shell: bash
      working-directory: __marketplace
      run: |
        PLUGIN_NAME="${{ inputs.plugin-name }}"
        VERSION="${{ inputs.version }}"
        REF="${{ inputs.ref }}"

        # Strip leading v from version if present
        VERSION="${VERSION#v}"

        JSON_FILE=".claude-plugin/marketplace.json"

        # Check plugin exists
        FOUND=$(jq --arg name "$PLUGIN_NAME" '[.plugins[] | select(.name == $name)] | length' "$JSON_FILE")
        if [ "$FOUND" -eq 0 ]; then
          echo "::error::Plugin '$PLUGIN_NAME' not found in marketplace.json"
          exit 1
        fi

        RESOLVED_SHA="${{ inputs.sha }}"

        # Check if version, ref, and sha are already current
        CURRENT_VERSION=$(jq -r --arg name "$PLUGIN_NAME" '.plugins[] | select(.name == $name) | .version' "$JSON_FILE")
        CURRENT_REF=$(jq -r --arg name "$PLUGIN_NAME" '.plugins[] | select(.name == $name) | .source.ref' "$JSON_FILE")
        CURRENT_SHA=$(jq -r --arg name "$PLUGIN_NAME" '.plugins[] | select(.name == $name) | .source.sha // ""' "$JSON_FILE")
        if [ "$CURRENT_VERSION" = "$VERSION" ] && [ "$CURRENT_REF" = "$REF" ] && [ "$CURRENT_SHA" = "$RESOLVED_SHA" ]; then
          echo "Plugin '$PLUGIN_NAME' is already at version $VERSION (ref: $REF, sha: $RESOLVED_SHA). Nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Update version, source.ref, and source.sha
        jq --arg name "$PLUGIN_NAME" \
           --arg ver "$VERSION" \
           --arg ref "$REF" \
           --arg sha "$RESOLVED_SHA" \
           '(.plugins[] | select(.name == $name)) |= (.version = $ver | .source.ref = $ref | .source.sha = $sha)' \
           "$JSON_FILE" > tmp.json && mv tmp.json "$JSON_FILE"

        SOURCE_REPO=$(jq -r --arg name "$PLUGIN_NAME" '.plugins[] | select(.name == $name) | .source.repo' "$JSON_FILE")

        echo "Updated $PLUGIN_NAME: $CURRENT_VERSION -> $VERSION (ref: $REF, sha: $RESOLVED_SHA)"
        echo "skipped=false" >> "$GITHUB_OUTPUT"
        echo "sha=${RESOLVED_SHA}" >> "$GITHUB_OUTPUT"
        echo "current-version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
        echo "source-repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"

    - name: Fetch upstream changelog
      id: changelog
      if: steps.update.outputs.skipped != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        SOURCE_REPO: ${{ steps.update.outputs.source-repo }}
        NEW_REF: ${{ inputs.ref }}
        NEW_VERSION: ${{ inputs.version }}
        OLD_VERSION: ${{ steps.update.outputs.current-version }}
      run: |
        NEW_VERSION="${NEW_VERSION#v}"

        # Fetch CHANGELOG.md from the plugin repo at the new ref.
        # If absent, emit an empty changelog output and exit.
        if ! gh api "repos/${SOURCE_REPO}/contents/CHANGELOG.md?ref=${NEW_REF}" --jq .content 2>/dev/null | base64 -d > /tmp/upstream-changelog.md; then
          echo "No CHANGELOG.md at ${SOURCE_REPO}@${NEW_REF}"
          {
            echo "content<<CHANGELOG_EOF"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Extract version section slice (OLD_VERSION, NEW_VERSION].
        # release-please CHANGELOG headers look like: ## [1.2.3](url) (date) OR ## 1.2.3
        FILE=/tmp/upstream-changelog.md
        mapfile -t HEADERS < <(grep -nE '^## \[?[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | sed -E 's/^([0-9]+):## \[?([0-9]+\.[0-9]+\.[0-9]+).*/\1:\2/')

        TOTAL_LINES=$(wc -l < "$FILE")
        SLICE=""
        for i in "${!HEADERS[@]}"; do
          IFS=: read -r LN VER <<< "${HEADERS[$i]}"
          NEXT_IDX=$((i + 1))
          if [ "$NEXT_IDX" -lt "${#HEADERS[@]}" ]; then
            NEXT_LN="${HEADERS[$NEXT_IDX]%%:*}"
            END=$((NEXT_LN - 1))
          else
            END="$TOTAL_LINES"
          fi

          # Skip if VER == OLD_VERSION (range is exclusive on old)
          [ "$VER" = "$OLD_VERSION" ] && continue
          # Keep only if OLD_VERSION < VER <= NEW_VERSION
          MAX_OLD=$(printf '%s\n%s\n' "$OLD_VERSION" "$VER" | sort -V | tail -1)
          [ "$MAX_OLD" != "$VER" ] && continue
          MAX_NEW=$(printf '%s\n%s\n' "$VER" "$NEW_VERSION" | sort -V | tail -1)
          [ "$MAX_NEW" != "$NEW_VERSION" ] && continue

          SECTION=$(sed -n "${LN},${END}p" "$FILE")
          if [ -n "$SLICE" ]; then
            SLICE="${SLICE}"$'\n\n'"${SECTION}"
          else
            SLICE="${SECTION}"
          fi
        done

        {
          echo "content<<CHANGELOG_EOF"
          echo "${SLICE}"
          echo "CHANGELOG_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create PR
      id: pr
      if: steps.update.outputs.skipped != 'true'
      shell: bash
      working-directory: __marketplace
      env:
        GH_TOKEN: ${{ inputs.token }}
        PLUGIN_NAME: ${{ inputs.plugin-name }}
        VERSION: ${{ inputs.version }}
        REF: ${{ inputs.ref }}
        SHA: ${{ steps.update.outputs.sha }}
        CHANGELOG: ${{ steps.changelog.outputs.content }}
      run: |
        VERSION="${VERSION#v}"
        BRANCH="update/${PLUGIN_NAME}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        COMMIT_MSG="feat(${PLUGIN_NAME}): bump to ${VERSION}"

        PR_BODY_FILE="$(mktemp)"
        {
          echo "Automated plugin version update."
          echo ""
          echo "- **Plugin:** \`${PLUGIN_NAME}\`"
          echo "- **Version:** \`${VERSION}\`"
          echo "- **Ref:** \`${REF}\`"
          echo "- **SHA:** \`${SHA}\`"
          if [ -n "$CHANGELOG" ]; then
            echo ""
            echo "<details>"
            echo "<summary>Changelog</summary>"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "</details>"
          fi
        } > "$PR_BODY_FILE"

        # Check if branch already exists on remote
        if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
          git checkout -- .claude-plugin/marketplace.json
          git fetch origin "$BRANCH"
          git checkout -b "$BRANCH" "origin/$BRANCH"
          git restore --source origin/main -- .claude-plugin/marketplace.json
          # Re-apply the update on top of the existing branch
          jq --arg name "$PLUGIN_NAME" \
             --arg ver "$VERSION" \
             --arg ref "$REF" \
             --arg sha "$SHA" \
             '(.plugins[] | select(.name == $name)) |= (.version = $ver | .source.ref = $ref | .source.sha = $sha)' \
             .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
          git add .claude-plugin/marketplace.json
          git diff --staged --quiet && { echo "No changes needed."; echo "url="; exit 0; }
          git commit -m "$COMMIT_MSG"
          git push --force-with-lease origin "$BRANCH"
          # Update existing PR body/title if present, otherwise create
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --title "$COMMIT_MSG" --body-file "$PR_BODY_FILE")
          else
            gh pr edit "$PR_URL" --title "$COMMIT_MSG" --body-file "$PR_BODY_FILE"
          fi
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
        else
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "$COMMIT_MSG"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --title "$COMMIT_MSG" --body-file "$PR_BODY_FILE")
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
        fi
